<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PocketUp</title>
<meta name="theme-color" content="#07111F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PocketUp">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%2307111F'/%3E%3Ctext x='96' y='130' font-family='Arial Black' font-weight='900' font-size='90' text-anchor='middle' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<link rel="manifest" id="manifest-placeholder">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#07111F;color:white;font-family:'DM Sans',sans-serif;height:100%;overflow-x:hidden}
  #root{min-height:100vh}
  ::-webkit-scrollbar{width:0}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  input{outline:none;color:white;font-family:'DM Sans',sans-serif}
  button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pu-pulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* CSS splash — visible IMMÉDIATEMENT avant que React charge */
  #pu-splash{
    position:fixed;inset:0;background:#07111F;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:99999;transition:opacity .4s;
  }
  #pu-splash h1{font-family:'Syne',sans-serif;font-weight:800;font-size:52px;line-height:1}
  #pu-splash .white{color:white}
  #pu-splash .blue{color:#2563EB}
  #pu-splash .arrows{display:flex;flex-direction:column;align-items:center;margin-top:20px}
  #pu-splash p{font-family:'DM Sans',sans-serif;font-weight:300;font-size:14px;color:rgba(255,255,255,.45);margin-top:32px}
  #pu-splash .dot{width:6px;height:6px;border-radius:50%;background:#2563EB;margin-top:20px;animation:pu-pulse 1.2s ease-in-out infinite}
</style>
<script>
(function(){
  const manifest={name:"PocketUp",short_name:"PocketUp",description:"Gère ton argent de poche",start_url:"/",display:"standalone",background_color:"#07111F",theme_color:"#07111F",orientation:"portrait",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%2307111F'/%3E%3Ctext x='96' y='130' font-family='Arial Black' font-weight='900' font-size='90' text-anchor='middle' fill='white'%3EP%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  document.getElementById("manifest-placeholder").href=URL.createObjectURL(blob);
})();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const swCode=`const CACHE="pocketup-v1";const ASSETS=["/"];self.addEventListener("install",e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
    const blob=new Blob([swCode],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>
</head>
<body>

<!-- Splash CSS visible immédiatement — disparaît quand React prend le relais -->
<div id="pu-splash">
  <h1><span class="white">Pocket</span><span class="blue">Up</span></h1>
  <div class="arrows">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="opacity:.45;margin-top:-8px"><path d="M12 19V5M5 12l7-7 7 7" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <p>Pour ceux qui n'attendent pas.</p>
  <div class="dot"></div>
</div>

<div id="root"></div>

<!-- Production React — 3x plus rapide que development -->
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { createClient } = supabase;
const {
  Home, Wallet, Target, Trophy, User, Plus, Minus, Trash2,
  ChevronRight, Star, Lock, LogOut, Camera, Share2, Award, Flame,
  TrendingUp, TrendingDown, Zap, Package, Pizza, Gamepad2, Shirt,
  Bus, Film, Banknote, Gift, Briefcase, Footprints, Headphones,
  Smartphone, Music, Plane, Clapperboard, Gem, Watch, X, Check,
  ArrowUpRight, ArrowDownRight, Bell, Shield,
  AlertCircle, RefreshCw, Loader
} = LucideReact;

const sb = createClient(
  "https://ehanljoryxvopfnpzsxe.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoYW5sam9yeXh2b3BmbnB6c3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Mzc1ODUsImV4cCI6MjA4OTExMzU4NX0.FQ2Fj4O2NiU5cjbuqVQv2rHSo2zYL-EohuUg-pUSjCY"
);

// Cache la splash CSS quand React est prêt
function hideCssSplash(){
  const el=document.getElementById("pu-splash");
  if(el){el.style.opacity="0";setTimeout(()=>{el.style.display="none";},400);}
}

const C = {
  bg:"#07111F", navy2:"#0C1A2E", navy3:"#112240", navy4:"#1B3461",
  blue:"#2563EB", blue2:"#1D4ED8", blue3:"#60A5FA",
  green:"#10B981", red:"#F43F5E", gold:"#F59E0B",
  muted:"rgba(255,255,255,0.45)", border:"rgba(255,255,255,0.09)", border2:"rgba(255,255,255,0.05)",
};

const DEPENSE_CATS = [
  {id:"bouffe",    label:"Bouffe",    Icon:Pizza    },
  {id:"jeux",      label:"Jeux",      Icon:Gamepad2 },
  {id:"fringues",  label:"Fringues",  Icon:Shirt    },
  {id:"transport", label:"Transport", Icon:Bus      },
  {id:"sorties",   label:"Sorties",   Icon:Film     },
  {id:"autre",     label:"Autre",     Icon:Package  },
];
const REVENU_CATS = [
  {id:"argent de poche", label:"Argent de poche", Icon:Banknote },
  {id:"cadeau",          label:"Cadeau",          Icon:Gift     },
  {id:"job",             label:"Job",             Icon:Briefcase},
  {id:"autre",           label:"Autre",           Icon:Package  },
];
const OBJ_ICONS = [
  {id:"footprints",   label:"Sneakers",  Icon:Footprints  },
  {id:"shirt",        label:"Vêtement",  Icon:Shirt       },
  {id:"gamepad-2",    label:"Jeux",      Icon:Gamepad2    },
  {id:"headphones",   label:"Casque",    Icon:Headphones  },
  {id:"smartphone",   label:"Téléphone", Icon:Smartphone  },
  {id:"music",        label:"Musique",   Icon:Music       },
  {id:"plane",        label:"Voyage",    Icon:Plane       },
  {id:"clapperboard", label:"Cinéma",    Icon:Clapperboard},
  {id:"gem",          label:"Luxe",      Icon:Gem         },
  {id:"watch",        label:"Montre",    Icon:Watch       },
  {id:"package",      label:"Autre",     Icon:Package     },
];

const getCatData = id => [...DEPENSE_CATS,...REVENU_CATS].find(c=>c.id===id)||{label:id,Icon:Package};
const getCatLabel = id => getCatData(id).label;
const getCatIcon  = id => getCatData(id).Icon;

const getBalance = (txs=[]) => (txs??[]).reduce((t,tx)=>{
  if(tx.type==="revenu")  return t+(tx.montant||0);
  if(tx.type==="depense") return t-(tx.montant||0);
  return t;
},0);

const fmt = n => new Intl.NumberFormat("fr-CH",{style:"currency",currency:"CHF",maximumFractionDigits:2}).format(n||0);

const dateRel = d => {
  const diff=Math.floor((Date.now()-new Date(d).getTime())/86400000);
  if(diff===0) return "Aujourd'hui";
  if(diff===1) return "Hier";
  return new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
};

function Toast({msg,type,visible}){
  const bg=type==="success"?C.green:type==="error"?C.red:C.blue;
  return <div style={{position:"fixed",bottom:100,left:"50%",transform:`translateX(-50%) translateY(${visible?0:20}px)`,background:bg,color:"white",borderRadius:12,padding:"10px 20px",fontSize:14,fontWeight:500,zIndex:9999,opacity:visible?1:0,transition:"all .3s",whiteSpace:"nowrap",maxWidth:280,textAlign:"center",boxShadow:`0 4px 20px ${bg}55`}}>{msg}</div>;
}

function useToast(){
  const [toast,setToast]=useState({msg:"",type:"success",visible:false});
  const timerRef=useRef(null);
  const showToast=useCallback((msg,type="success")=>{
    if(timerRef.current) clearTimeout(timerRef.current);
    setToast({msg,type,visible:true});
    timerRef.current=setTimeout(()=>setToast(t=>({...t,visible:false})),2800);
  },[]);
  return {toast,showToast};
}

function ProgressBar({pct,color=C.blue,height=6}){
  const p=Math.min(100,Math.max(0,pct||0));
  return <div style={{height,background:"rgba(255,255,255,0.08)",borderRadius:height/2,overflow:"hidden"}}>
    <div style={{height:"100%",width:`${p}%`,borderRadius:height/2,background:`linear-gradient(90deg,${color},${color===C.blue?C.blue3:color})`,transition:"width .8s cubic-bezier(.4,0,.2,1)"}}/>
  </div>;
}

function Card({children,style,hero}){
  return <div style={{background:hero?C.navy3:C.navy2,border:`0.5px solid ${hero?"rgba(255,255,255,0.09)":C.border2}`,borderRadius:hero?20:16,padding:hero?24:16,boxShadow:hero?"0 0 60px rgba(37,99,235,0.08)":"none",...style}}>{children}</div>;
}

function BtnPrimary({children,onClick,disabled,style}){
  return <button onClick={onClick} disabled={disabled} style={{width:"100%",background:disabled?"rgba(37,99,235,0.4)":"linear-gradient(135deg,#2563EB,#1D4ED8)",borderRadius:14,padding:"15px 20px",fontFamily:"Syne,sans-serif",fontWeight:600,fontSize:14,color:"white",boxShadow:disabled?"none":"0 4px 20px rgba(37,99,235,0.35)",opacity:disabled?.6:1,transition:"all .2s",...style}}>{children}</button>;
}

function Modal({open,onClose,title,children}){
  if(!open) return null;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.navy2,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:430,maxHeight:"90vh",overflow:"auto",padding:"24px 20px 40px",animation:"slideUp .3s ease"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <span style={{fontFamily:"Syne",fontWeight:700,fontSize:17}}>{title}</span>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",borderRadius:"50%",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}><X size={16}/></button>
      </div>
      {children}
    </div>
  </div>;
}

function TransactionModal({open,initialType="depense",onClose,onSaved,showToast,user}){
  const [type,setType]=useState("depense");
  const [selectedCat,setSelectedCat]=useState("bouffe");
  const [montant,setMontant]=useState("");
  const [description,setDescription]=useState("");
  const [submitting,setSubmitting]=useState(false);

  useEffect(()=>{
    if(open){
      const t=initialType||"depense";
      setType(t);
      setSelectedCat(t==="depense"?"bouffe":"argent de poche");
      setMontant("");setDescription("");setSubmitting(false);
    }
  },[open,initialType]);

  const handleTypeChange=t=>{setType(t);setSelectedCat(t==="depense"?"bouffe":"argent de poche");};

  const handleSubmit=async()=>{
    if(submitting) return;
    if(!montant||parseFloat(montant)<=0){showToast("Entre un montant valide","error");return;}
    if(!user) return;
    setSubmitting(true);
    try{
      const {data,error}=await sb.from("transactions").insert({
        user_id:user.id,montant:parseFloat(montant),
        description:description||getCatLabel(selectedCat),
        categorie:selectedCat,type,
      }).select().maybeSingle();
      if(error) throw error;
      if(!data){
        await new Promise(r=>setTimeout(r,200));
        const {data:fetched}=await sb.from("transactions").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1).maybeSingle();
        onSaved(fetched||{id:Date.now(),created_at:new Date().toISOString(),user_id:user.id,montant:parseFloat(montant),description:description||getCatLabel(selectedCat),categorie:selectedCat,type});
      }else{onSaved(data);}
      onClose();showToast("Transaction ajoutée ✓","success");
    }catch(e){console.error(e);showToast(e?.message||"Erreur lors de l'ajout","error");}
    finally{setSubmitting(false);}
  };

  const cats=type==="depense"?DEPENSE_CATS:REVENU_CATS;
  return <Modal open={open} onClose={onClose} title="Nouvelle transaction">
    <div style={{display:"flex",background:"rgba(255,255,255,0.05)",borderRadius:12,padding:4,marginBottom:20}}>
      {[["depense","Dépense"],["revenu","Revenu"]].map(([v,l])=>(
        <button key={v} onClick={()=>handleTypeChange(v)} style={{flex:1,padding:"10px 0",borderRadius:9,fontSize:14,fontWeight:600,fontFamily:"Syne",transition:"all .2s",background:type===v?(v==="depense"?C.red:C.green):"transparent",color:type===v?"white":C.muted}}>{l}</button>
      ))}
    </div>
    <div style={{textAlign:"center",marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontFamily:"Syne",fontSize:32,fontWeight:800,color:C.muted}}>CHF</span>
        <input type="number" inputMode="decimal" placeholder="0.00" value={montant} onChange={e=>setMontant(e.target.value)} style={{background:"transparent",border:"none",fontFamily:"Syne",fontSize:48,fontWeight:800,width:150,textAlign:"center"}}/>
      </div>
      <div style={{height:1,background:"rgba(255,255,255,0.1)",margin:"0 40px"}}/>
    </div>
    <p style={{fontSize:12,color:C.muted,marginBottom:10,letterSpacing:1,textTransform:"uppercase"}}>Catégorie</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
      {cats.map(c=>{
        const sel=selectedCat===c.id;
        return <button key={c.id} onClick={()=>setSelectedCat(c.id)} style={{borderRadius:12,padding:"12px 8px",textAlign:"center",border:`1px solid ${sel?C.blue:"rgba(255,255,255,0.08)"}`,background:sel?"rgba(37,99,235,0.15)":"rgba(255,255,255,0.03)",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all .2s"}}>
          <c.Icon size={20} color={sel?C.blue3:C.muted}/>
          <span style={{fontSize:11,color:sel?"white":C.muted,fontWeight:sel?600:400}}>{c.label}</span>
        </button>;
      })}
    </div>
    <input type="text" placeholder="Description (optionnel)" value={description} onChange={e=>setDescription(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"14px 16px",fontSize:14,marginBottom:20}}/>
    <BtnPrimary onClick={handleSubmit} disabled={submitting||!montant||parseFloat(montant)<=0}>{submitting?"Ajout en cours...":"Valider"}</BtnPrimary>
  </Modal>;
}

function GoalModal({open,onClose,onSaved,showToast,user}){
  const [nom,setNom]=useState("");
  const [montantCible,setMontantCible]=useState("");
  const [selectedIcon,setSelectedIcon]=useState("footprints");
  const [submitting,setSubmitting]=useState(false);
  useEffect(()=>{if(open){setNom("");setMontantCible("");setSelectedIcon("footprints");setSubmitting(false);}},[open]);
  const handleSubmit=async()=>{
    if(submitting) return;
    if(!nom||!montantCible||parseFloat(montantCible)<=0){showToast("Remplis tous les champs","error");return;}
    if(!user) return;
    setSubmitting(true);
    try{
      const {data,error}=await sb.from("objectifs").insert({user_id:user.id,nom,montant_cible:parseFloat(montantCible),montant_actuel:0,emoji:selectedIcon,statut:"actif"}).select().maybeSingle();
      if(error) throw error;
      if(data){onSaved(data);}else{
        const {data:fetched}=await sb.from("objectifs").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1).maybeSingle();
        if(fetched) onSaved(fetched);
      }
      onClose();showToast("Objectif créé ✓","success");
    }catch(e){showToast("Erreur","error");}finally{setSubmitting(false);}
  };
  return <Modal open={open} onClose={onClose} title="Nouvel objectif">
    <input type="text" placeholder="Nom de l'article..." value={nom} onChange={e=>setNom(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"14px 16px",fontSize:14,marginBottom:14}}/>
    <input type="number" inputMode="decimal" placeholder="Montant cible (CHF)" value={montantCible} onChange={e=>setMontantCible(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"14px 16px",fontSize:14,marginBottom:20}}/>
    <p style={{fontSize:12,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>Icône</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>
      {OBJ_ICONS.map(ic=>{
        const sel=selectedIcon===ic.id;
        return <button key={ic.id} onClick={()=>setSelectedIcon(ic.id)} style={{borderRadius:12,padding:"10px 8px",border:`1px solid ${sel?C.blue:"rgba(255,255,255,0.08)"}`,background:sel?"rgba(37,99,235,0.15)":"rgba(255,255,255,0.03)",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <ic.Icon size={18} color={sel?C.blue3:C.muted}/>
          <span style={{fontSize:9,color:sel?"white":C.muted}}>{ic.label}</span>
        </button>;
      })}
    </div>
    <BtnPrimary onClick={handleSubmit} disabled={submitting||!nom||!montantCible}>{submitting?"Création...":"Créer l'objectif"}</BtnPrimary>
  </Modal>;
}

function FeedModal({open,onClose,objectif,onFeed,showToast}){
  const [montant,setMontant]=useState("");
  const [submitting,setSubmitting]=useState(false);
  useEffect(()=>{if(open){setMontant("");setSubmitting(false);}},[open]);
  if(!objectif) return null;
  const handleSubmit=async()=>{
    if(submitting||!montant||parseFloat(montant)<=0) return;
    setSubmitting(true);
    try{await onFeed(objectif.id,parseFloat(montant));onClose();}
    catch(e){console.error(e);}
    finally{setSubmitting(false);}
  };
  return <Modal open={open} onClose={onClose} title={`Alimenter — ${objectif.nom}`}>
    <div style={{textAlign:"center",marginBottom:20}}>
      <p style={{fontSize:13,color:C.muted,marginBottom:4}}>{fmt(objectif.montant_actuel)} / {fmt(objectif.montant_cible)}</p>
      <ProgressBar pct={(objectif.montant_actuel/objectif.montant_cible)*100}/>
    </div>
    <input type="number" inputMode="decimal" placeholder="Montant à ajouter (CHF)" value={montant} onChange={e=>setMontant(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"14px 16px",fontSize:14,marginBottom:20}}/>
    <BtnPrimary onClick={handleSubmit} disabled={submitting||!montant||parseFloat(montant)<=0}>{submitting?"Ajout...":"Ajouter"}</BtnPrimary>
  </Modal>;
}

function HomeTab({profil,transactions,objectifs,defis,onSwitchTab}){
  const balance=getBalance(transactions);
  const h=new Date().getHours();
  const greeting=h<18?"Bonjour":"Bonsoir";
  const objectif=(objectifs??[]).find(o=>o.statut==="actif");
  const defi=(defis??[]).find(d=>d.statut==="actif");
  const recent=(transactions??[]).slice(0,3);
  const revenus7j=(transactions??[]).filter(t=>t.type==="revenu"&&(Date.now()-new Date(t.created_at).getTime())<7*86400000).reduce((s,t)=>s+(t.montant||0),0);
  const dep7j=(transactions??[]).filter(t=>t.type==="depense"&&(Date.now()-new Date(t.created_at).getTime())<7*86400000).reduce((s,t)=>s+(t.montant||0),0);
  const epargne7j=Math.max(revenus7j-dep7j,1);
  const semaines=objectif?Math.ceil((objectif.montant_cible-objectif.montant_actuel)/epargne7j):0;
  const ObjIcon=objectif?(OBJ_ICONS.find(i=>i.id===objectif.emoji)?.Icon||Package):Package;
  const rev=(transactions??[]).filter(t=>t.type==="revenu").reduce((s,t)=>s+(t.montant||0),0);
  const dep=(transactions??[]).filter(t=>t.type==="depense").reduce((s,t)=>s+(t.montant||0),0);

  return <div style={{padding:"0 16px 20px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,paddingTop:8}}>

      <button onClick={()=>openTxModal("depense")} style={{background:"rgba(244,63,94,.12)",border:"1px solid rgba(244,63,94,.3)",borderRadius:14,padding:"14px 0",display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontFamily:"Syne",fontWeight:600,fontSize:14,color:C.red}}><Minus size={18}/> Dépense</button>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:20}}>

          <p style={{fontSize:12,color:C.muted}}>{getCatLabel(t.categorie)} · {dateRel(t.created_at)}</p>

        <span style={{fontFamily:"Syne",fontWeight:700,fontSize:15,color:isR?C.green:C.red,flexShrink:0}}>{isR?"+":"-"}{fmt(t.montant)}</span>

function DefisTab({defis,loading}){
  const [timedOut,setTimedOut]=useState(false);
  useEffect(()=>{if(!loading&&defis.length===0){const t=setTimeout(()=>setTimedOut(true),5000);return()=>clearTimeout(t);}},[loading,defis]);
  if(loading) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:16}}><Loader size={32} color={C.blue3} style={{animation:"spin 1s linear infinite"}}/><p style={{color:C.muted,fontSize:14}}>Chargement des défis...</p></div>;

  const main=defis.find(d=>d.statut==="actif");

    <h2 style={{fontFamily:"Syne",fontWeight:700,fontSize:22,marginBottom:20,paddingTop:8}}>Défis 🏆</h2>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Target size={18} color={C.blue3}/><span style={{fontFamily:"Syne",fontWeight:600,fontSize:15}}>{main.nom}</span></div>

        <span style={{fontSize:12,color:C.muted}}>{main.progression}/{main.objectif_progression}</span>
        <span style={{fontSize:12,fontWeight:700,color:C.blue3}}>{pctMain}%</span>
      </div>
      <p style={{fontSize:13,color:C.blue3,marginTop:10,fontWeight:500}}>{msg}</p>
    </Card>}
    <p style={{fontFamily:"Syne",fontWeight:700,fontSize:16,marginBottom:12}}>Tous les défis</p>
    {defis.map(d=>{
      const done=d.statut==="complete";const p=Math.round((d.progression/d.objectif_progression)*100);
      return <Card key={d.id} style={{marginBottom:10,background:done?"rgba(16,185,129,.05)":"rgba(255,255,255,.02)",border:`0.5px solid ${done?"rgba(16,185,129,.2)":C.border2}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <p style={{fontSize:14,fontWeight:500,flex:1}}>{d.nom}</p>
          {done&&<Check size={16} color={C.green} style={{flexShrink:0}}/>}
        </div>
        <ProgressBar pct={p} color={done?C.green:C.blue}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
          <span style={{fontSize:11,color:C.muted}}>{d.progression}/{d.objectif_progression}</span>
          <span style={{fontSize:11,color:done?C.green:C.muted}}>{p}%</span>
        </div>
      </Card>;
    })}
    <p style={{fontFamily:"Syne",fontWeight:700,fontSize:16,marginBottom:12,marginTop:20}}>Badges</p>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
      {defis.map((d,i)=>(
        <div key={i} style={{borderRadius:14,padding:"14px 10px",textAlign:"center",background:d.statut==="complete"?"rgba(245,158,11,.06)":"rgba(255,255,255,.02)",border:`0.5px solid ${d.statut==="complete"?"rgba(245,158,11,.25)":C.border2}`,opacity:d.statut==="complete"?1:.4}}>

      <div style={{display:"flex",alignItems:"center",gap:10}}><Flame size={22} color={C.gold}/><div><p style={{fontFamily:"Syne",fontWeight:700,fontSize:16}}>{profil?.streak??1} jours de streak</p><p style={{fontSize:12,color:C.muted}}>Record : {profil?.streak_record??1} jours</p></div></div>
      <Zap size={18} color={C.gold}/>
    </Card>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      {[{label:"Total économisé",val:fmt(totalRevenu),color:C.green,Icon:TrendingUp},{label:"Total dépensé",val:fmt(totalDepense),color:C.red,Icon:TrendingDown},{label:"Défis complétés",val:defisComplete,color:C.blue3,Icon:Trophy},{label:"Streak record",val:`${profil?.streak_record??1}j`,color:C.gold,Icon:Award}].map(s=>(
        <Card key={s.label} style={{textAlign:"center"}}><s.Icon size={18} color={s.color} style={{margin:"0 auto 6px"}}/><p style={{fontFamily:"Syne",fontWeight:700,fontSize:16,color:s.color}}>{s.val}</p><p style={{fontSize:11,color:C.muted,marginTop:2}}>{s.label}</p></Card>
      ))}
    </div>
    <p style={{fontFamily:"Syne",fontWeight:700,fontSize:16,marginBottom:12}}>Partager</p>
    <Card style={{marginBottom:16}}>
      <button onClick={handleShare} style={{display:"flex",alignItems:"center",gap:10,width:"100%"}}>
        <div style={{width:40,height:40,borderRadius:12,background:"rgba(37,99,235,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}><Share2 size={18} color={C.blue3}/></div>
        <div style={{flex:1,textAlign:"left"}}><p style={{fontWeight:600,fontSize:14}}>Partager PocketUp</p><p style={{fontSize:12,color:C.muted}}>Invite tes amis à rejoindre</p></div>
        <ChevronRight size={16} color={C.muted}/>
      </button>
    </Card>
    <p style={{fontFamily:"Syne",fontWeight:700,fontSize:16,marginBottom:12}}>Paramètres</p>
    <Card style={{marginBottom:20}}>
      {[
        {label:"Installer sur l'écran d'accueil",Icon:Smartphone,action:()=>setShowInstallGuide(true)},
        {label:"Notifications",Icon:Bell,action:async()=>{
          if(!("Notification" in window)){showToast("Non supporté sur cet appareil","error");return;}
          if(Notification.permission==="granted"){showToast("Notifications déjà activées ✓","success");return;}
          if(Notification.permission==="denied"){showToast("Autorise les notifications dans les paramètres","error");return;}
          const p=await Notification.requestPermission();
          showToast(p==="granted"?"Notifications activées ✓":"Notifications refusées",p==="granted"?"success":"error");
        }},
        {label:"Sécurité",Icon:Shield,action:async()=>{
          if(!user?.email){showToast("Aucun email associé","error");return;}
          try{const {error}=await sb.auth.resetPasswordForEmail(user.email,{redirectTo:window.location.origin});if(error)throw error;showToast("Email de réinitialisation envoyé ✓","success");}
          catch(e){showToast("Erreur lors de l'envoi","error");}
        }},
      ].map((item,i)=>(
        <div key={item.label}>
          <button onClick={item.action} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"12px 0"}}>
            <item.Icon size={18} color={C.muted}/>
            <span style={{flex:1,textAlign:"left",fontSize:14}}>{item.label}</span>
            <ChevronRight size={16} color={C.muted}/>
          </button>
          {i<2&&<div style={{height:1,background:C.border2}}/>}
        </div>
      ))}
    </Card>
    <button onClick={onSignOut} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"15px 0",borderRadius:14,border:"1px solid rgba(244,63,94,.3)",background:"rgba(244,63,94,.08)",color:C.red,fontFamily:"Syne",fontWeight:600,fontSize:14,marginBottom:12}}><LogOut size={16}/> Se déconnecter</button>
    <Modal open={showInstallGuide} onClose={()=>setShowInstallGuide(false)} title="Installer PocketUp">
      <p style={{fontSize:13,color:C.muted,marginBottom:20}}>Ajoute PocketUp sur ton écran d'accueil pour y accéder comme une vraie app, même sans internet.</p>
      <p style={{fontFamily:"Syne",fontWeight:700,fontSize:14,marginBottom:12,color:C.blue3}}>Sur iPhone (Safari)</p>
      {iPhoneSteps.map((step,i)=>(
        <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
          <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:"rgba(37,99,235,.2)",border:`1px solid ${C.blue}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:C.blue3}}>{i+1}</div>
          <p style={{fontSize:13,color:"white",paddingTop:4}}>{step}</p>
        </div>
      ))}
      <div style={{height:1,background:C.border2,margin:"16px 0"}}/>
      <p style={{fontFamily:"Syne",fontWeight:700,fontSize:14,marginBottom:12,color:C.green}}>Sur Android (Chrome)</p>
      {androidSteps.map((step,i)=>(
        <div key={i} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
          <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:"rgba(16,185,129,.15)",border:`1px solid ${C.green}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:C.green}}>{i+1}</div>
          <p style={{fontSize:13,color:"white",paddingTop:4}}>{step}</p>
        </div>
      ))}
      <div style={{marginTop:20}}><BtnPrimary onClick={()=>setShowInstallGuide(false)}>Compris !</BtnPrimary></div>
    </Modal>
  </div>;
}

function AuthScreen(){
  const [tab,setTab]=useState("login");
  const [prenom,setPrenom]=useState("");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [error,setError]=useState("");
  const inputStyle={width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:12,padding:"14px 16px",fontSize:14,marginBottom:12};
  const handleSubmit=async()=>{
    if(submitting) return;setError("");
    if(!email||!password){setError("Remplis tous les champs");return;}
    if(tab==="register"&&password!==confirm){setError("Les mots de passe ne correspondent pas");return;}
    if(tab==="register"&&!prenom){setError("Entre ton prénom");return;}
    if(tab==="register"&&password.length<6){setError("Mot de passe trop court (6 caractères min)");return;}
    setSubmitting(true);
    try{
      if(tab==="login"){
        const {error}=await sb.auth.signInWithPassword({email,password});
        if(error){if(error.message.includes("Invalid login credentials"))setError("Email ou mot de passe incorrect");else setError(error.message);}
      }else{
        const {data,error}=await sb.auth.signUp({email,password});
        if(error){if(error.message.includes("already registered"))setError("Cet email est déjà utilisé");else if(error.message.includes("rate limit"))setError("Attends 60 secondes puis réessaie");else setError(error.message);}
        else if(data?.user){const today=new Date().toISOString().split("T")[0];await sb.from("profil").insert({id:data.user.id,prenom:prenom||"Toi",streak:1,streak_record:1,derniere_visite:today});}
      }
    }catch(e){setError(e?.message||"Erreur inattendue");}
    finally{setSubmitting(false);}
  };
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
    <div style={{textAlign:"center",marginBottom:48}}>
      <h1 style={{fontFamily:"Syne",fontWeight:800,fontSize:42,lineHeight:1}}><span style={{color:"white"}}>Pocket</span><span style={{color:C.blue}}>Up</span></h1>
      <p style={{fontFamily:"DM Sans",fontWeight:300,fontSize:13,color:C.muted,marginTop:8}}>Pour ceux qui n'attendent pas.</p>
    </div>
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{display:"flex",background:"rgba(255,255,255,.05)",borderRadius:12,padding:4,marginBottom:24}}>
        {[["login","Connexion"],["register","Créer un compte"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"10px 0",borderRadius:9,fontSize:14,fontFamily:"Syne",fontWeight:600,background:tab===v?C.blue:"transparent",color:tab===v?"white":C.muted}}>{l}</button>
        ))}
      </div>
      {tab==="register"&&<input type="text" placeholder="Ton prénom" value={prenom} onChange={e=>setPrenom(e.target.value)} style={inputStyle}/>}
      <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={inputStyle}/>
      <input type="password" placeholder="Mot de passe" value={password} onChange={e=>setPassword(e.target.value)} style={inputStyle}/>
      {tab==="register"&&<input type="password" placeholder="Confirmer le mot de passe" value={confirm} onChange={e=>setConfirm(e.target.value)} style={inputStyle}/>}
      {error&&<p style={{color:C.red,fontSize:13,marginBottom:12,textAlign:"center"}}>{error}</p>}
      <BtnPrimary onClick={handleSubmit} disabled={submitting}>{submitting?"...":tab==="login"?"Se connecter":"Créer mon compte"}</BtnPrimary>
    </div>
  </div>;
}

const NAV_TABS=[
  {id:"home",Icon:Home,label:"Accueil"},
  {id:"moves",Icon:Wallet,label:"Mouvements"},
  {id:"objectifs",Icon:Target,label:"Objectifs"},
  {id:"defis",Icon:Trophy,label:"Défis"},
  {id:"profil",Icon:User,label:"Profil"},
];
function BottomNav({active,onSwitch}){
  return <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(12,26,46,0.97)",backdropFilter:"blur(20px)",borderTop:"0.5px solid rgba(255,255,255,.08)",display:"flex",padding:"10px 0 calc(10px + env(safe-area-inset-bottom, 0px))",zIndex:100}}>
    {NAV_TABS.map(t=>{const sel=active===t.id;return <button key={t.id} onClick={()=>onSwitch(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><t.Icon size={22} color={sel?C.blue:"rgba(255,255,255,.35)"} strokeWidth={sel?2.5:1.5}/><span style={{fontSize:10,color:sel?C.blue:"rgba(255,255,255,.35)",fontWeight:sel?600:400,fontFamily:"Syne"}}>{t.label}</span></button>;})}
  </div>;
}

function PocketUp(){
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [profil,setProfil]=useState(null);
  const [transactions,setTransactions]=useState([]);
  const [objectifs,setObjectifs]=useState([]);
  const [defis,setDefis]=useState([]);
  const [dataLoading,setDataLoading]=useState(false);
  const [activeTab,setActiveTab]=useState("home");
  const [txModal,setTxModal]=useState(false);
  const [txModalType,setTxModalType]=useState("depense");
  const [deferredPrompt,setDeferredPrompt]=useState(null);
  const [showInstallBanner,setShowInstallBanner]=useState(false);
  const [installDismissed,setInstallDismissed]=useState(localStorage.getItem("pu_install_dismissed")==="true");
  const {toast,showToast}=useToast();
  const dataLoadedRef=useRef(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user??null);setAuthLoading(false);
      if(session?.user){dataLoadedRef.current=true;loadAllData(session.user);}
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{
      setUser(session?.user??null);
      if(session?.user){if(!dataLoadedRef.current){dataLoadedRef.current=true;loadAllData(session.user);}}
      else{dataLoadedRef.current=false;setProfil(null);setTransactions([]);setObjectifs([]);setDefis([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!authLoading) hideCssSplash();
  },[authLoading]);

  useEffect(()=>{
    window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();setDeferredPrompt(e);if(!installDismissed)setShowInstallBanner(true);});
    window.addEventListener("appinstalled",()=>{setShowInstallBanner(false);setDeferredPrompt(null);showToast("PocketUp installé ✓","success");});
  },[installDismissed]);

  const handleInstall=async()=>{if(!deferredPrompt){setShowInstallBanner(false);return;}deferredPrompt.prompt();const {outcome}=await deferredPrompt.userChoice;if(outcome==="accepted")showToast("Installation en cours...","success");setDeferredPrompt(null);setShowInstallBanner(false);};
  const handleDismissInstall=()=>{setShowInstallBanner(false);setInstallDismissed(true);localStorage.setItem("pu_install_dismissed","true");};

  const updateDefiProgress=async(currentDefis,currentTxs,currentObjectifs,u)=>{
    if(!currentDefis?.length||!u) return;
    const updates=[];
    for(let i=0;i<currentDefis.length;i++){
      const d=currentDefis[i];if(d.statut==="complete") continue;
      let prog=0;
      if(i===0){const deps=(currentTxs??[]).filter(t=>t.type==="depense");const last=deps[0]?new Date(deps[0].created_at):null;prog=last?Math.min(5,Math.floor((Date.now()-last.getTime())/86400000)):5;}
      else if(i===1){const rev=(currentTxs??[]).filter(t=>t.type==="revenu").reduce((s,t)=>s+(t.montant||0),0);const dep=(currentTxs??[]).filter(t=>t.type==="depense").reduce((s,t)=>s+(t.montant||0),0);prog=rev>0?Math.min(100,Math.round(((rev-dep)/rev)*100)):0;}
      else if(i===2){const obj=(currentObjectifs??[]).find(o=>o.statut==="actif");prog=obj?Math.min(50,Math.round((obj.montant_actuel/obj.montant_cible)*100)):0;}
      else if(i===3){const days=new Set((currentTxs??[]).filter(t=>t.type==="depense").map(t=>t.created_at.split("T")[0]));prog=Math.min(7,days.size);}
      else if(i===4){prog=Math.min(3,(currentDefis??[]).filter(d=>d.statut==="complete").length);}
      if(prog!==d.progression){const done=prog>=d.objectif_progression;updates.push({id:d.id,prog,done});}
    }
    if(!updates.length) return;
    const updatedDefis=[...currentDefis];
    for(const u2 of updates){
      try{await sb.from("defis").update({progression:u2.prog,statut:u2.done?"complete":"actif"}).eq("id",u2.id);const idx=updatedDefis.findIndex(d=>d.id===u2.id);if(idx>-1)updatedDefis[idx]={...updatedDefis[idx],progression:u2.prog,statut:u2.done?"complete":"actif"};}
      catch(e){console.error(e);}
    }
    setDefis([...updatedDefis]);
  };

  const loadAllData=async u=>{
    if(!u) return;setDataLoading(true);
    let txsData=[];let objsData=[];
    try{
      let {data:p}=await sb.from("profil").select("*").eq("id",u.id).maybeSingle();
      if(!p){const today=new Date().toISOString().split("T")[0];const {data:np}=await sb.from("profil").insert({id:u.id,prenom:"Toi",streak:1,streak_record:1,derniere_visite:today}).select().maybeSingle();p=np;}
      else{const today=new Date().toISOString().split("T")[0];const yesterday=new Date(Date.now()-86400000).toISOString().split("T")[0];if(p.derniere_visite!==today){const streak=p.derniere_visite===yesterday?(p.streak||1)+1:1;const record=Math.max(streak,p.streak_record||1);await sb.from("profil").update({streak,streak_record:record,derniere_visite:today}).eq("id",u.id);p={...p,streak,streak_record:record};}}
      setProfil(p);
      try{const {data:txs,error}=await sb.from("transactions").select("*").eq("user_id",u.id).order("created_at",{ascending:false});if(error)throw error;txsData=txs??[];setTransactions(txsData);}catch(e){console.error(e);setTransactions([]);}
      try{const {data:objs,error}=await sb.from("objectifs").select("*").eq("user_id",u.id).order("created_at",{ascending:false});if(error)throw error;objsData=objs??[];setObjectifs(objsData);}catch(e){console.error(e);setObjectifs([]);}
      try{
        const {data:dfs,error}=await sb.from("defis").select("*").eq("user_id",u.id).order("created_at",{ascending:true});
        if(error)throw error;
        if(!dfs||dfs.length===0){
          await sb.from("defis").insert([
            {user_id:u.id,nom:"Zéro dépense pendant 5 jours",progression:0,objectif_progression:5,statut:"actif",badge:"Maître de la retenue"},
            {user_id:u.id,nom:"Économise 20% de tes revenus",progression:0,objectif_progression:100,statut:"actif",badge:"Stratège financier"},
            {user_id:u.id,nom:"Atteins 50% de ton objectif",progression:0,objectif_progression:50,statut:"actif",badge:"Mi-chemin"},
            {user_id:u.id,nom:"Note tes dépenses 7 jours de suite",progression:0,objectif_progression:7,statut:"actif",badge:"Comptable en herbe"},
            {user_id:u.id,nom:"Complète 3 défis ce mois",progression:0,objectif_progression:3,statut:"actif",badge:"Champion"},
          ]);
          const {data:newDfs}=await sb.from("defis").select("*").eq("user_id",u.id);
          setDefis(newDfs??[]);setTimeout(()=>updateDefiProgress(newDfs??[],txsData,objsData,u),500);
        }else{setDefis(dfs);setTimeout(()=>updateDefiProgress(dfs,txsData,objsData,u),500);}
      }catch(e){console.error(e);setDefis([]);}
    }catch(e){console.error(e);}
    finally{setDataLoading(false);}
  };

  const handleSignOut=async()=>{await sb.auth.signOut();setUser(null);setProfil(null);setTransactions([]);setObjectifs([]);setDefis([]);setActiveTab("home");};

  const onAddTx=tx=>{if(!tx) return;setTransactions(prev=>{const newTxs=[tx,...prev];setTimeout(()=>updateDefiProgress(defis,newTxs,objectifs,user),300);return newTxs;});};

  const onDeleteTx=async id=>{
    if(!user) return;
    try{const {error}=await sb.from("transactions").delete().eq("id",id);if(error)throw error;setTransactions(prev=>{const newTxs=prev.filter(t=>t.id!==id);setTimeout(()=>updateDefiProgress(defis,newTxs,objectifs,user),300);return newTxs;});}
    catch(e){console.error(e);showToast("Erreur suppression","error");}
  };

  const onAddObjectif=obj=>setObjectifs(prev=>[obj,...prev]);

  const onMarkDone=async id=>{
    if(!user) return;
    try{const {error}=await sb.from("objectifs").update({statut:"atteint"}).eq("id",id);if(error)throw error;setObjectifs(prev=>prev.map(o=>o.id===id?{...o,statut:"atteint"}:o));const newObjs=objectifs.map(o=>o.id===id?{...o,statut:"atteint"}:o);setTimeout(()=>updateDefiProgress(defis,transactions,newObjs,user),300);}
    catch(e){console.error(e);}
  };

  const onFeed=async(id,amount)=>{
    if(!user) return;const obj=objectifs.find(o=>o.id===id);if(!obj) return;
    const newTotal=Math.min(obj.montant_actuel+amount,obj.montant_cible);const newStatut=newTotal>=obj.montant_cible?"atteint":"actif";
    try{const {error}=await sb.from("objectifs").update({montant_actuel:newTotal,statut:newStatut}).eq("id",id);if(error)throw error;setObjectifs(prev=>prev.map(o=>o.id===id?{...o,montant_actuel:newTotal,statut:newStatut}:o));const newObjs=objectifs.map(o=>o.id===id?{...o,montant_actuel:newTotal,statut:newStatut}:o);setTimeout(()=>updateDefiProgress(defis,transactions,newObjs,user),300);if(newStatut==="atteint")showToast("🎉 Objectif atteint !","success");else showToast(`+${fmt(amount)} ajouté`,"success");}
    catch(e){console.error(e);}
  };

  const onUpdateProfil=async updates=>{if(!user) return;try{const {error}=await sb.from("profil").update(updates).eq("id",user.id);if(error)throw error;setProfil(p=>({...p,...updates}));}catch(e){console.error(e);}};

  if(authLoading) return null;

  return <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",color:"white",overflowX:"hidden"}}>
    {!user?(
      <AuthScreen/>
    ):dataLoading?(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16}}>
        <Loader size={32} color={C.blue3} style={{animation:"spin 1s linear infinite"}}/>
        <p style={{color:C.muted,fontSize:14}}>Chargement de tes données...</p>
      </div>
    ):(
      <>
        <div style={{paddingBottom:90,paddingTop:16}}>
          {activeTab==="home"      &&<HomeTab profil={profil} transactions={transactions} objectifs={objectifs} defis={defis} onSwitchTab={setActiveTab}/>}
          {activeTab==="moves"     &&<MovesTab transactions={transactions} onDeleteTx={onDeleteTx} showToast={showToast} openTxModal={type=>{setTxModalType(type);setTxModal(true);}}/>}
          {activeTab==="objectifs" &&<ObjectifsTab objectifs={objectifs} onAddObjectif={onAddObjectif} onFeed={onFeed} onMarkDone={onMarkDone} showToast={showToast} user={user}/>}
          {activeTab==="defis"     &&<DefisTab defis={defis} loading={dataLoading}/>}
          {activeTab==="profil"    &&<ProfilTab profil={profil} transactions={transactions} defis={defis} showToast={showToast} onSignOut={handleSignOut} onUpdateProfil={onUpdateProfil} user={user}/>}
        </div>
        {showInstallBanner&&<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:398,background:C.navy3,border:"1px solid rgba(37,99,235,.4)",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,zIndex:500,boxShadow:"0 8px 32px rgba(0,0,0,.4)",animation:"slideUp .3s ease"}}>
          <div style={{width:44,height:44,borderRadius:12,flexShrink:0,background:"linear-gradient(135deg,#2563EB,#1D4ED8)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:"Syne",fontWeight:800,fontSize:18,color:"white"}}>P</span></div>
          <div style={{flex:1,minWidth:0}}><p style={{fontFamily:"Syne",fontWeight:700,fontSize:14}}>Installer PocketUp</p><p style={{fontSize:12,color:C.muted,marginTop:2}}>Ajoute l'app sur ton écran d'accueil</p></div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={handleDismissInstall} style={{padding:"8px 12px",borderRadius:10,fontSize:12,border:`1px solid ${C.border}`,background:"rgba(255,255,255,.05)",color:C.muted}}>Plus tard</button>
            <button onClick={handleInstall} style={{padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:700,fontFamily:"Syne",background:"linear-gradient(135deg,#2563EB,#1D4ED8)",color:"white",border:"none",boxShadow:"0 2px 12px rgba(37,99,235,.4)"}}>Installer</button>
          </div>
        </div>}
        <BottomNav active={activeTab} onSwitch={setActiveTab}/>
        <button onClick={()=>{setTxModalType("depense");setTxModal(true);}} style={{position:"fixed",bottom:80,right:"calc(50% - 215px + 16px)",width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#2563EB,#1D4ED8)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(37,99,235,.5)",zIndex:200}}><Plus size={24}/></button>
        <TransactionModal open={txModal} initialType={txModalType} onClose={()=>setTxModal(false)} onSaved={onAddTx} showToast={showToast} user={user}/>
        <Toast {...toast}/>
      </>
    )}
  </div>;
}
